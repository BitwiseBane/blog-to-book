name: Build & Publish Ebook

on:
  push:
    paths:
      - 'links.txt'
  workflow_dispatch:
    inputs:
      book_title:
        description: 'Book title (optional override)'
        required: false
        default: ''
      version_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc wget curl jq python3 python3-pip
          # Install TinyTeX for PDF generation
          wget -qO- "https://yihui.org/tinytex/install-bin-unix.sh" | sh
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH
          export PATH="$HOME/.TinyTeX/bin/x86_64-linux:$PATH"
          tlmgr install xetex fontspec geometry fancyhdr titlesec tcolorbox
          tlmgr install hyperref xcolor graphics booktabs caption
          tlmgr install lm lm-math || true

      - name: Parse links.txt and fetch metadata
        id: meta
        run: |
          # Read first non-comment line for book title if not overridden
          TITLE_FROM_FILE=$(grep "^# title:" links.txt | head -1 | sed 's/^# title://' | xargs || echo "")
          AUTHOR_FROM_FILE=$(grep "^# author:" links.txt | head -1 | sed 's/^# author://' | xargs || echo "Gouranga Das Samrat")
          
          # Use workflow input or fallback to file metadata
          BOOK_TITLE="${{ github.event.inputs.book_title }}"
          if [ -z "$BOOK_TITLE" ]; then
            BOOK_TITLE="$TITLE_FROM_FILE"
          fi
          if [ -z "$BOOK_TITLE" ]; then
            BOOK_TITLE="Developer Ebook"
          fi

          AUTHOR="$AUTHOR_FROM_FILE"
          DATE=$(date +"%B %Y")
          SAFE_TITLE=$(echo "$BOOK_TITLE" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')

          echo "book_title=$BOOK_TITLE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "safe_title=$SAFE_TITLE" >> $GITHUB_OUTPUT
          echo "📚 Building: $BOOK_TITLE by $AUTHOR"

      - name: Scrape dev.to articles
        run: |
          mkdir -p chapters
          CHAPTER=1

          # Skip comment lines and empty lines
          grep -v "^#" links.txt | grep -v "^$" | while read -r URL; do
            echo "⬇️  Fetching: $URL"

            # Extract article slug for API call
            SLUG=$(echo "$URL" | sed 's|https://dev.to/||')

            # Use dev.to API to get article content
            API_URL="https://dev.to/api/articles/$SLUG"
            RESPONSE=$(curl -s "$API_URL" \
              -H "Accept: application/json" \
              -H "User-Agent: ebook-builder/1.0")

            # Check if API returned valid data
            TITLE=$(echo "$RESPONSE" | jq -r '.title // empty')
            BODY=$(echo "$RESPONSE" | jq -r '.body_markdown // empty')

            if [ -z "$TITLE" ] || [ -z "$BODY" ]; then
              echo "⚠️  Could not fetch: $URL — skipping"
              CHAPTER=$((CHAPTER + 1))
              continue
            fi

            PADDED=$(printf "%03d" $CHAPTER)
            OUTFILE="chapters/${PADDED}-chapter.md"

            # Write chapter with title and source
            {
              echo "# $TITLE"
              echo ""
              echo "*Source: $URL*"
              echo ""
              echo "---"
              echo ""
              echo "$BODY"
              echo ""
              echo "\\newpage"
              echo ""
            } > "$OUTFILE"

            echo "✅ Chapter $CHAPTER: $TITLE"
            CHAPTER=$((CHAPTER + 1))
            sleep 0.5  # be polite to the API
          done

          echo "📄 Total chapters: $(ls chapters/*.md 2>/dev/null | wc -l)"

      - name: Create metadata file
        run: |
          cat > metadata.yaml << EOF
          ---
          title: "${{ steps.meta.outputs.book_title }}"
          author: "${{ steps.meta.outputs.author }}"
          date: "${{ steps.meta.outputs.date }}"
          lang: en
          description: |
            A comprehensive ebook compiled from dev.to articles
            by ${{ steps.meta.outputs.author }}.
          rights: "© ${{ steps.meta.outputs.author }}"
          ...
          EOF

      - name: Build PDF
        run: |
          export PATH="$HOME/.TinyTeX/bin/x86_64-linux:$PATH"
          SAFE="${{ steps.meta.outputs.safe_title }}"

          pandoc metadata.yaml chapters/*.md \
            -o "${SAFE}.pdf" \
            --pdf-engine=xelatex \
            --toc \
            --toc-depth=2 \
            --highlight-style=tango \
            -V geometry:"margin=1in" \
            -V fontsize=11pt \
            -V linestretch=1.3 \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue \
            --number-sections \
            2>&1 || echo "⚠️ PDF build had warnings"

          if [ -f "${SAFE}.pdf" ]; then
            echo "✅ PDF built: ${SAFE}.pdf ($(du -sh ${SAFE}.pdf | cut -f1))"
          else
            echo "❌ PDF build failed"
            exit 1
          fi

      - name: Build EPUB
        run: |
          SAFE="${{ steps.meta.outputs.safe_title }}"

          pandoc metadata.yaml chapters/*.md \
            -o "${SAFE}.epub" \
            --toc \
            --toc-depth=2 \
            --highlight-style=tango \
            --number-sections \
            2>&1 || echo "⚠️ EPUB build had warnings"

          if [ -f "${SAFE}.epub" ]; then
            echo "✅ EPUB built: ${SAFE}.epub ($(du -sh ${SAFE}.epub | cut -f1))"
          else
            echo "❌ EPUB build failed"
            exit 1
          fi

      - name: Determine release tag
        id: tag
        run: |
          INPUT_TAG="${{ github.event.inputs.version_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="v$(date +'%Y.%m.%d')-$(date +'%H%M')"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "🏷️  Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.meta.outputs.book_title }} — ${{ steps.tag.outputs.tag }}"
          body: |
            ## 📚 ${{ steps.meta.outputs.book_title }}

            **Author:** ${{ steps.meta.outputs.author }}
            **Published:** ${{ steps.meta.outputs.date }}
            **Articles included:** $(grep -v "^#" links.txt | grep -v "^$" | wc -l)

            ### Downloads
            - 📄 **PDF** — best for reading on desktop or printing
            - 📱 **EPUB** — best for e-readers (Kindle, Kobo, etc.)

            ---
            *Auto-generated from [dev.to](https://dev.to) articles using GitHub Actions.*
          files: |
            ${{ steps.meta.outputs.safe_title }}.pdf
            ${{ steps.meta.outputs.safe_title }}.epub
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
